<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauna balance</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-nature { background: linear-gradient(135deg, #166534 0%, #0369a1 100%); }
    </style>
</head>
<body class="p-4">
    <!-- PANTALLA DE BIENVENIDA -->
    <div id="welcome-screen" class="fixed inset-0 z-50 bg-nature flex flex-col items-center justify-center p-6 text-center text-white">
        <img src="assets/portada.png" class="w-64 mb-8 rounded-3xl shadow-2xl">
        <h1 class="text-5xl font-black uppercase italic tracking-tighter mb-2">Fauna balance</h1>
        <p class="mb-8 opacity-80 italic">Contador oficial de ecosistemas</p>
        <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
            <button onclick="initApp(1)" class="bg-white/20 backdrop-blur-md py-4 rounded-2xl font-bold border border-white/30 hover:bg-white/40">1 Jugador</button>
            <button onclick="initApp(2)" class="bg-white/20 backdrop-blur-md py-4 rounded-2xl font-bold border border-white/30 hover:bg-white/40">2 Jugadores</button>
            <button onclick="initApp(3)" class="bg-white/20 backdrop-blur-md py-4 rounded-2xl font-bold border border-white/30 hover:bg-white/40">3 Jugadores</button>
            <button onclick="initApp(4)" class="bg-white/20 backdrop-blur-md py-4 rounded-2xl font-bold border border-white/30 hover:bg-white/40">4 Jugadores</button>
        </div>
    </div>

    <!-- APP PRINCIPAL (ASISTENTE) -->
    <div id="main-app" class="hidden max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
            <span id="player-indicator" class="text-xs font-black text-slate-400 uppercase tracking-widest"></span>
            <span id="step-indicator" class="text-[10px] font-bold bg-slate-200 px-2 py-1 rounded-full text-slate-600">PASO 1/4</span>
        </div>

        <div class="p-6">
            <!-- PASO 1: PAISAJES -->
            <div id="step1" class="step active space-y-6">
                <h2 class="text-xl font-black text-slate-800 uppercase italic">🌲 Paisajes Naturales</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
                        <label class="block text-[10px] font-bold text-green-700 uppercase mb-2 text-center">Árboles (1, 3, 7 pts)</label>
                        <input id="t1" type="number" placeholder="Cant. T1" class="w-full p-2 rounded-lg text-sm mb-1">
                        <input id="t2" type="number" placeholder="Cant. T2" class="w-full p-2 rounded-lg text-sm mb-1">
                        <input id="t3" type="number" placeholder="Cant. T3" class="w-full p-2 rounded-lg text-sm">
                    </div>
                    <div class="bg-slate-100 p-4 rounded-2xl border border-slate-200">
                        <label class="block text-[10px] font-bold text-slate-700 uppercase mb-2 text-center">Montañas Ady.</label>
                        <input id="m2" type="number" placeholder="Cant. H2" class="w-full p-2 rounded-lg text-sm mb-1">
                        <input id="m3" type="number" placeholder="Cant. H3" class="w-full p-2 rounded-lg text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100">
                        <label class="block text-[10px] font-bold text-yellow-700 uppercase mb-2 text-center">Prados (5 pts/grupo)</label>
                        <input id="fld" type="number" placeholder="Nº Grupos 2+" class="w-full p-2 rounded-lg text-sm">
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
                        <label class="block text-[10px] font-bold text-red-700 uppercase mb-2 text-center">Ciudades (5 pts)</label>
                        <input id="bld" type="number" placeholder="Válidos (3 col)" class="w-full p-2 rounded-lg text-sm">
                    </div>
                </div>
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <label class="block text-[10px] font-bold text-blue-700 uppercase mb-2">💧 Agua y Ríos</label>
                    <div class="flex gap-2">
                        <select id="w-mode" class="w-1/2 p-2 rounded-lg text-sm font-bold border-none shadow-sm">
                            <option value="A">Lado A: Río</option>
                            <option value="B">Lado B: Islas</option>
                        </select>
                        <input id="w-val" type="number" placeholder="Fichas/Islas" class="w-1/2 p-2 rounded-lg text-sm">
                    </div>
                </div>
                <button onclick="nextStep(2)" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest">Siguiente: Fauna ➔</button>
            </div>

            <!-- PASO 2: FAUNA -->
            <div id="step2" class="step space-y-6">
                <h2 class="text-xl font-black text-amber-600 uppercase italic">🐾 Especies de Fauna</h2>
                <div class="grid grid-cols-3 gap-3" id="fauna-grid"></div>
                <div class="flex gap-2">
                    <button onclick="nextStep(1)" class="w-1/3 bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl uppercase text-xs">Atrás</button>
                    <button onclick="nextStep(3)" class="w-2/3 bg-slate-800 text-white font-black py-4 rounded-2xl uppercase tracking-widest">Siguiente: Espíritu ➔</button>
                </div>
            </div>

            <!-- PASO 3: ESPÍRITUS Y DESEMPATE -->
            <div id="step3" class="step space-y-6">
                <h2 class="text-xl font-black text-purple-700 uppercase italic">✨ Ajuste Final</h2>
                <div class="bg-purple-50 p-5 rounded-3xl border border-purple-100 space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-purple-800 uppercase italic">¿Espíritu completado?</span>
                        <input type="checkbox" id="spirit-check" class="w-6 h-6 accent-purple-600">
                    </div>
                    <input id="spirit-pts" type="number" placeholder="Puntos adicionales del espíritu" class="w-full p-3 rounded-xl text-sm shadow-inner">
                </div>
                <div class="bg-amber-50 p-5 rounded-3xl border border-amber-100 space-y-2">
                    <label class="block text-[10px] font-black text-amber-800 uppercase italic">Cubos de animal colocados (Desempate)</label>
                    <input id="tie-cubes" type="number" placeholder="Cantidad total" class="w-full p-3 rounded-xl text-sm shadow-inner">
                </div>
                <div class="flex gap-2">
                    <button onclick="nextStep(2)" class="w-1/3 bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl uppercase text-xs">Atrás</button>
                    <button id="finish-btn" onclick="savePlayerData()" class="w-2/3 bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest italic text-sm">Confirmar Jugador</button>
                </div>
            </div>

            <!-- PASO 4: RANKING -->
            <div id="step4" class="step space-y-6 text-center">
                <div id="ranking-list" class="space-y-3"></div>
                <div id="solo-info" class="hidden p-4 bg-amber-100 rounded-3xl border border-amber-200">
                    <p class="text-sm font-bold text-amber-800 uppercase italic mb-1">Nivel de Éxito</p>
                    <p id="soles-display" class="text-3xl"></p>
                </div>
                <button onclick="resetApp()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Nueva Partida</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
